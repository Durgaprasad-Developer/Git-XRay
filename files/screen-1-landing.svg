<svg viewBox="0 0 640 700" xmlns="http://www.w3.org/2000/svg" font-family="monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="640" height="700" fill="url(#bg)" rx="16"/>
  <rect x="1" y="1" width="638" height="698" fill="none" stroke="#2a2a2a" stroke-width="1" rx="16"/>

  <!-- Nav -->
  <rect x="0" y="0" width="640" height="56" fill="#0d0d0d" rx="16"/>
  <rect x="0" y="40" width="640" height="16" fill="#0d0d0d"/>
  <rect x="0" y="55" width="640" height="1" fill="#2a2a2a"/>
  <text x="28" y="34" font-family="sans-serif" font-size="15" font-weight="800" fill="#5DCAA5" letter-spacing="-0.3">GitHub</text>
  <text x="92" y="34" font-family="sans-serif" font-size="15" font-weight="800" fill="#888780" letter-spacing="-0.3">Xray</text>
  <rect x="574" y="20" width="42" height="16" fill="#085041" rx="8"/>
  <text x="595" y="31" font-family="monospace" font-size="8" fill="#5DCAA5" text-anchor="middle" letter-spacing="0.05em">Beta</text>

  <!-- Kicker -->
  <rect x="28" y="88" width="18" height="1" fill="#1D9E75"/>
  <text x="52" y="91" font-family="monospace" font-size="9" fill="#1D9E75" letter-spacing="0.18em">AI-POWERED PROFILE ANALYSIS</text>

  <!-- Title -->
  <text x="28" y="132" font-family="sans-serif" font-size="38" font-weight="800" fill="#e8e8e8" letter-spacing="-1">See what your GitHub</text>
  <text x="28" y="176" font-family="sans-serif" font-size="38" font-weight="800" fill="#e8e8e8" letter-spacing="-1">says </text>
  <text x="128" y="176" font-family="sans-serif" font-size="38" font-weight="800" fill="#5DCAA5" letter-spacing="-1">about you.</text>

  <!-- Subtitle -->
  <text x="28" y="214" font-family="monospace" font-size="12" fill="#b0b0a8" letter-spacing="0">Get an honest, AI-powered review of your GitHub profile</text>
  <text x="28" y="232" font-family="monospace" font-size="12" fill="#b0b0a8">in 30 seconds. Know your score, archetype, and exact</text>
  <text x="28" y="250" font-family="monospace" font-size="12" fill="#b0b0a8">steps to get shortlisted.</text>

  <!-- Input -->
  <rect x="28" y="274" width="440" height="48" fill="#111" stroke="#333" stroke-width="1" rx="10"/>
  <text x="46" y="303" font-family="monospace" font-size="12" fill="#5F5E5A">github.com/</text>
  <text x="128" y="303" font-family="monospace" font-size="12" fill="#555">yourusername</text>

  <!-- CTA Button -->
  <rect x="476" y="274" width="136" height="48" fill="#1D9E75" rx="10"/>
  <text x="544" y="303" font-family="monospace" font-size="12" font-weight="700" fill="#fff" text-anchor="middle" letter-spacing="0.04em">Analyze →</text>

  <!-- Demo chips -->
  <text x="28" y="344" font-family="monospace" font-size="10" fill="#5F5E5A">Try demo:</text>
  <rect x="90" y="330" width="74" height="22" fill="none" stroke="#333" stroke-width="1" rx="11"/>
  <text x="127" y="345" font-family="monospace" font-size="10" fill="#888780" text-anchor="middle">alexchen</text>
  <rect x="172" y="330" width="72" height="22" fill="none" stroke="#333" stroke-width="1" rx="11"/>
  <text x="208" y="345" font-family="monospace" font-size="10" fill="#888780" text-anchor="middle">priya-dev</text>
  <rect x="252" y="330" width="64" height="22" fill="none" stroke="#333" stroke-width="1" rx="11"/>
  <text x="284" y="345" font-family="monospace" font-size="10" fill="#888780" text-anchor="middle">kai2024</text>

  <!-- Divider -->
  <rect x="28" y="378" width="584" height="1" fill="#1f1f1f"/>

  <!-- Stats -->
  <text x="28" y="410" font-family="sans-serif" font-size="22" font-weight="800" fill="#e8e8e8">12K+</text>
  <text x="28" y="428" font-family="monospace" font-size="9" fill="#5F5E5A" letter-spacing="0.08em">PROFILES SCANNED</text>

  <text x="220" y="410" font-family="sans-serif" font-size="22" font-weight="800" fill="#e8e8e8">30s</text>
  <text x="220" y="428" font-family="monospace" font-size="9" fill="#5F5E5A" letter-spacing="0.08em">AVERAGE SCAN TIME</text>

  <text x="420" y="410" font-family="sans-serif" font-size="22" font-weight="800" fill="#e8e8e8">100%</text>
  <text x="420" y="428" font-family="monospace" font-size="9" fill="#5F5E5A" letter-spacing="0.08em">FREE, NO LOGIN</text>

  <!-- Screen label -->
  <rect x="20" y="656" width="110" height="24" fill="#1D9E75" rx="6"/>
  <text x="75" y="672" font-family="monospace" font-size="10" font-weight="700" fill="#fff" text-anchor="middle" letter-spacing="0.05em">SCREEN 1 / 3</text>
  <text x="148" y="672" font-family="monospace" font-size="10" fill="#5F5E5A">Landing Page</text>
</svg>
