  <rect x="28" y="308" width="186" height="72" fill="#111" stroke="#2a2a2a" stroke-width="1" rx="8"/>
  <text x="44" y="328" font-family="monospace" font-size="8" fill="#5F5E5A" letter-spacing="0.1em">PROFILE BRANDING</text>
  <text x="44" y="355" font-family="sans-serif" font-size="22" font-weight="800" fill="#5DCAA5">88</text>
  <text x="76" y="355" font-family="monospace" font-size="10" fill="#5F5E5A">/100</text>
  <rect x="44" y="366" width="154" height="3" fill="#1f1f1f" rx="1"/>
  <rect x="44" y="366" width="136" height="3" fill="#1D9E75" rx="1"/>

  <rect x="226" y="308" width="186" height="72" fill="#111" stroke="#2a2a2a" stroke-width="1" rx="8"/>
  <text x="242" y="328" font-family="monospace" font-size="8" fill="#5F5E5A" letter-spacing="0.1em">TECHNICAL DEPTH</text>
  <text x="242" y="355" font-family="sans-serif" font-size="22" font-weight="800" fill="#EF9F27">71</text>
  <text x="274" y="355" font-family="monospace" font-size="10" fill="#5F5E5A">/100</text>
