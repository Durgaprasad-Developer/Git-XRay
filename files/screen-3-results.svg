  <text x="52" y="788" font-family="monospace" font-size="8" fill="#fff" text-anchor="middle">3</text>
  <text x="68" y="788" font-family="monospace" font-size="10" fill="#e8e8e8">Contribute to 1 open source issue this month</text>
  <circle cx="52" cy="808" r="8" fill="#1D9E75"/>
  <text x="52" y="812" font-family="monospace" font-size="8" fill="#fff" text-anchor="middle">4</text>
  <text x="68" y="812" font-family="monospace" font-size="10" fill="#e8e8e8">Archive or delete abandoned/tutorial repos</text>

