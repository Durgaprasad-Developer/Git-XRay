  <text x="68" y="740" font-family="monospace" font-size="10" fill="#e8e8e8">Add README files to your top 5 repos with screenshots</text>
  <circle cx="52" cy="760" r="8" fill="#1D9E75"/>
  <text x="52" y="764" font-family="monospace" font-size="8" fill="#fff" text-anchor="middle">2</text>
  <text x="68" y="764" font-family="monospace" font-size="10" fill="#e8e8e8">Deploy your best project — even a free Vercel link counts</text>
