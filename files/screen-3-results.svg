  <text x="48" y="882" font-family="monospace" font-size="10" fill="#5F5E5A">github/<tspan fill="#5DCAA5">alexchen</tspan></text>
  <text x="556" y="874" font-family="sans-serif" font-size="44" font-weight="800" fill="#5DCAA5" text-anchor="end" letter-spacing="-1">74</text>
  <text x="556" y="890" font-family="monospace" font-size="12" fill="#5F5E5A" text-anchor="end">/100</text>
