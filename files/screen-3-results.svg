  <text x="134" y="964" font-family="monospace" font-size="8" fill="#5F5E5A" text-anchor="middle" letter-spacing="0.08em">CONSISTENCY</text>

  <rect x="228" y="922" width="172" height="52" fill="#161616" rx="6"/>
  <text x="314" y="948" font-family="sans-serif" font-size="22" font-weight="800" fill="#5DCAA5" text-anchor="middle">88</text>
  <text x="314" y="964" font-family="monospace" font-size="8" fill="#5F5E5A" text-anchor="middle" letter-spacing="0.08em">PROFILE</text>

  <rect x="408" y="922" width="172" height="52" fill="#161616" rx="6"/>
  <text x="494" y="948" font-family="sans-serif" font-size="22" font-weight="800" fill="#E24B4A" text-anchor="middle">34</text>
  <text x="494" y="964" font-family="monospace" font-size="8" fill="#5F5E5A" text-anchor="middle" letter-spacing="0.08em">OPEN SOURCE</text>

