  <!-- Tagline -->
  <text x="168" y="162" font-family="monospace" font-size="10" fill="#888780">Strong project velocity. Builds fast, ships often.</text>
  <text x="168" y="178" font-family="monospace" font-size="10" fill="#888780">Consistency needs work — spikes around events.</text>

  <!-- Subscores Grid -->
  <!-- Row 1 -->
  <rect x="28" y="228" width="186" height="72" fill="#111" stroke="#2a2a2a" stroke-width="1" rx="8"/>
  <text x="44" y="248" font-family="monospace" font-size="8" fill="#5F5E5A" letter-spacing="0.1em">CONSISTENCY</text>
  <text x="44" y="275" font-family="sans-serif" font-size="22" font-weight="800" fill="#EF9F27">68</text>
  <text x="76" y="275" font-family="monospace" font-size="10" fill="#5F5E5A">/100</text>
  <rect x="44" y="286" width="154" height="3" fill="#1f1f1f" rx="1"/>
  <rect x="44" y="286" width="105" height="3" fill="#EF9F27" rx="1"/>

  <rect x="226" y="228" width="186" height="72" fill="#111" stroke="#2a2a2a" stroke-width="1" rx="8"/>
  <text x="242" y="248" font-family="monospace" font-size="8" fill="#5F5E5A" letter-spacing="0.1em">PROJECT QUALITY</text>
  <text x="242" y="275" font-family="sans-serif" font-size="22" font-weight="800" fill="#EF9F27">62</text>
  <text x="274" y="275" font-family="monospace" font-size="10" fill="#5F5E5A">/100</text>
  <rect x="242" y="286" width="154" height="3" fill="#1f1f1f" rx="1"/>
  <rect x="242" y="286" width="95" height="3" fill="#EF9F27" rx="1"/>

  <rect x="424" y="228" width="188" height="72" fill="#111" stroke="#2a2a2a" stroke-width="1" rx="8"/>
  <text x="440" y="248" font-family="monospace" font-size="8" fill="#5F5E5A" letter-spacing="0.1em">OPEN SOURCE</text>
  <text x="440" y="275" font-family="sans-serif" font-size="22" font-weight="800" fill="#E24B4A">34</text>
  <text x="472" y="275" font-family="monospace" font-size="10" fill="#5F5E5A">/100</text>
  <rect x="440" y="286" width="154" height="3" fill="#1f1f1f" rx="1"/>
  <rect x="440" y="286" width="52" height="3" fill="#E24B4A" rx="1"/>

