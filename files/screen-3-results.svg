<svg viewBox="0 0 640 1100" xmlns="http://www.w3.org/2000/svg" font-family="monospace">
  <!-- Background -->
  <rect width="640" height="1100" fill="#0a0a0a" rx="16"/>
  <rect x="1" y="1" width="638" height="1098" fill="none" stroke="#2a2a2a" stroke-width="1" rx="16"/>

