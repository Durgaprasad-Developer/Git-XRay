  <text x="64" y="659" font-family="monospace" font-size="10" fill="#888780">Verdict: </text>
  <text x="112" y="659" font-family="monospace" font-size="10" fill="#5DCAA5" font-weight="bold">Strong internship candidate. Would advance to call.</text>

