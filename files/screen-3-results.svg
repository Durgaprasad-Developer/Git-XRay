  <text x="64" y="562" font-family="monospace" font-size="10" fill="#e8e8e8">Active and curious — clearly loves experimenting with new tech.</text>
  <circle cx="52" cy="582" r="4" fill="#1D9E75"/>
  <text x="64" y="586" font-family="monospace" font-size="10" fill="#e8e8e8">Strong prototyping instinct. Good fit for fast-moving teams.</text>
  <circle cx="52" cy="606" r="4" fill="#EF9F27"/>
  <text x="64" y="610" font-family="monospace" font-size="10" fill="#e8e8e8">Hard to assess depth — no architecture docs, no prod links.</text>
  <circle cx="52" cy="630" r="4" fill="#E24B4A"/>
  <text x="64" y="634" font-family="monospace" font-size="10" fill="#e8e8e8">Zero open source contributions. No team collaboration evidence.</text>
